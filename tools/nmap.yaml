apiVersion: cleargate.dev/v1alpha1
kind: ToolSpec
metadata:
  name: nmap
  displayName: Nmap Port Scanner
  version: "7.94"
  description: "Network exploration tool and security / port scanner"
  owner: admin
runtime:
  executable: nmap
  omitExecutable: true
  containerImage: "docker.io/instrumentisto/nmap:latest"
  argv0: nmap
  timeoutSeconds: 30
flags:
  - id: target
    type: string
    required: true
    ui:
      label: "Target Host(s)"
      category: "Target Specification"
  - id: unprivileged
    type: boolean
    flag: "--unprivileged"
    default: true
    ui:
      label: "Run Unprivileged"
      category: "Scan Techniques"
  - id: skipPing
    type: boolean
    flag: "-Pn"
    default: true
    ui:
      label: "Skip Ping (Treat all hosts as online)"
      category: "Scan Techniques"
  - id: synScan
    type: boolean
    flag: "-sS"
    default: false
    ui:
      label: "TCP SYN Scan"
      category: "Scan Techniques"
  - id: serviceVersion
    type: boolean
    flag: "-sV"
    default: false
    ui:
      label: "Probe open ports to determine service/version info"
      category: "Service/Version Detection"
presets:
  - id: quick
    name: Quick Scan
    values:
      synScan: false
      serviceVersion: false
  - id: full
    name: Full Version Scan
    values:
      synScan: false
      serviceVersion: true
positionals:
  - id: p1
    source: target
    order: 1
